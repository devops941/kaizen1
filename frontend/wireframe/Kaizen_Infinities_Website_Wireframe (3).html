<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kaizen Infinities — Website Wireframe</title>
<style>
  :root{
    --ink:#2b2b2b; --line:#999; --line-d:#555; --paper:#fff; --bg:#e7e7e7;
    --panel:#f4f4f4; --accent:#1f2937; --note-b:#b8860b; --note-bg:#fff8e6;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  .topbar{background:#111;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 6px rgba(0,0,0,.3);}
  .topbar .t1{font-weight:800;font-size:15px;letter-spacing:.3px;}
  .topbar .t2{font-size:11px;color:#bbb;margin-top:2px;}
  .topbar .meta{font-size:11px;color:#ccc;text-align:right;}
  .app{display:flex;align-items:flex-start;}
  .sidebar{width:250px;flex:0 0 250px;background:var(--panel);border-right:2px solid #222;height:calc(100vh - 55px);overflow-y:auto;position:sticky;top:55px;}
  .sidebar .grp-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#888;padding:12px 14px 4px;font-weight:700;}
  .sidebar button{display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:none;cursor:pointer;font-size:12.5px;color:#333;border-bottom:1px solid #ddd;line-height:1.3;}
  .sidebar button .num{display:inline-block;width:18px;color:#999;font-weight:700;}
  .sidebar button:hover{background:#e2e2e2;}
  .sidebar button.active{background:var(--accent);color:#fff;font-weight:700;}
  .sidebar button.active .num{color:#9ca3af;}
  .main{flex:1;padding:26px 30px 80px;max-width:1180px;}
  .page{display:none;}
  .page.active{display:block;}
  .wf-page-head{margin-bottom:18px;border-bottom:3px solid #222;padding-bottom:10px;}
  .wf-page-head .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#777;font-weight:700;}
  .wf-page-head h1{font-size:24px;margin:2px 0 0;}
  .wf-page-head .k2{font-size:13px;color:#666;margin-top:2px;}

  .wf-section{border:1.5px solid var(--line);background:var(--paper);margin-bottom:18px;padding:22px 20px 18px;position:relative;border-radius:3px;}
  .wf-section.dark{background:#1c2430;color:#e5e7eb;border-color:#0a0f1a;}
  .wf-section.dark .wf-heading{color:#fff;}
  .wf-section.dark .wf-subheading{color:#b6c2d1;}
  .wf-tag{position:absolute;top:-11px;left:14px;background:#222;color:#fff;font-size:9.5px;letter-spacing:.6px;padding:3px 9px;text-transform:uppercase;font-weight:700;border-radius:2px;}
  .wf-heading{font-size:19px;font-weight:800;margin:8px 0 6px;}
  .wf-subheading{font-size:13px;color:#555;margin-bottom:12px;line-height:1.55;max-width:900px;}
  .wf-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:2px;}

  .wf-btnrow{margin:10px 0 4px;display:flex;gap:10px;flex-wrap:wrap;}
  .wf-btn{display:inline-block;border:1.5px solid #222;background:#ececec;padding:9px 20px;font-size:11.5px;font-weight:700;border-radius:3px;color:#222;}
  .wf-btn.secondary{background:#fff;}
  .dark .wf-btn{border-color:#8ea2c0;background:#2c3a4d;color:#fff;}

  .wf-img{border:1.5px dashed #9aa0a6;background:repeating-linear-gradient(45deg,#f2f2f2,#f2f2f2 10px,#e4e4e4 10px,#e4e4e4 20px);display:flex;align-items:center;justify-content:center;color:#7a7a7a;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:10px;border-radius:2px;}

  .wf-grid{display:grid;gap:12px;margin-top:8px;}
  .cols-2{grid-template-columns:repeat(2,1fr);}
  .cols-3{grid-template-columns:repeat(3,1fr);}
  .cols-4{grid-template-columns:repeat(4,1fr);}
  .cols-6{grid-template-columns:repeat(6,1fr);}
  @media(max-width:900px){.cols-2,.cols-3,.cols-4,.cols-6{grid-template-columns:repeat(2,1fr);}}

  .wf-card{border:1px solid #bbb;padding:12px 13px;background:#fafafa;border-radius:2px;}
  .wf-card h4{font-size:12.5px;margin:0 0 6px;font-weight:800;color:#222;}
  .wf-card p.d{font-size:11px;color:#666;margin:0 0 6px;font-style:italic;}
  .wf-card ul{margin:0;padding-left:15px;font-size:11px;color:#555;}
  .wf-card ul li{margin-bottom:3px;}
  .wf-card .more{font-size:10px;color:#999;margin-top:4px;font-style:italic;}

  .wf-icons{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-top:8px;}
  @media(max-width:900px){.wf-icons{grid-template-columns:repeat(3,1fr);}}
  .wf-icon-item{text-align:center;font-size:11px;color:#444;}
  .wf-icon-circ{width:40px;height:40px;border:1.5px solid #999;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#888;margin:0 auto 6px;background:#f0f0f0;}

  .wf-note{border:1.5px dashed var(--note-b);background:var(--note-bg);padding:11px 14px;font-size:11.5px;color:#6b4f00;margin-top:14px;border-radius:2px;}
  .wf-note strong{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;color:#8a6800;}

  .wf-flow{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:11.5px;font-weight:700;margin-top:6px;}
  .wf-flow.vertical{flex-direction:column;align-items:flex-start;}
  .wf-flow .step{border:1.5px solid #222;background:#ececec;padding:8px 13px;border-radius:3px;}
  .wf-flow .arrow{color:#999;font-weight:900;font-size:14px;}
  .wf-flow.vertical .arrow{margin-left:20px;}

  .wf-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px;}
  .wf-table th,.wf-table td{border:1px solid #bbb;padding:7px 10px;text-align:left;}
  .wf-table th{background:#e9e9e9;font-weight:700;}
  .wf-table tr:nth-child(even) td{background:#fafafa;}

  .wf-check{font-size:11.5px;color:#444;margin:4px 0;}
  .wf-check:before{content:"\2713  ";color:#1f8a4c;font-weight:900;}
  .wf-checklist{columns:2;column-gap:24px;}
  @media(max-width:700px){.wf-checklist{columns:1;}}

  details.wf-acc{border:1px solid #bbb;margin-bottom:8px;background:#fafafa;border-radius:2px;}
  details.wf-acc summary{padding:10px 14px;font-weight:700;font-size:12.5px;cursor:pointer;background:#e9e9e9;list-style:none;display:flex;justify-content:space-between;}
  details.wf-acc summary::-webkit-details-marker{display:none;}
  details.wf-acc summary:before{content:"▸  ";color:#555;}
  details.wf-acc[open] summary:before{content:"▾  ";}
  details.wf-acc .body{padding:11px 16px;font-size:11.5px;color:#555;}
  details.wf-acc .body b{color:#333;}

  .wf-split{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-top:6px;}
  @media(max-width:800px){.wf-split{grid-template-columns:1fr;}}

  .wf-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
  .wf-field{border:1.3px solid #aaa;background:#fff;border-radius:2px;padding:9px 10px;font-size:11px;color:#888;}
  .wf-field.full{grid-column:1/-1;}
  .wf-field.area{height:56px;align-content:start;}

  .wf-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:8px;}
  @media(max-width:900px){.wf-metrics{grid-template-columns:repeat(2,1fr);}}
  .wf-metric{border:1px solid #bbb;background:#fafafa;text-align:center;padding:14px 6px;border-radius:2px;}
  .wf-metric .num{font-size:22px;font-weight:900;color:#222;}
  .wf-metric .lbl{font-size:10px;color:#666;margin-top:2px;}

  .wf-nav-mock{display:flex;justify-content:space-between;align-items:center;border:1.5px solid #999;padding:11px 16px;background:#fff;font-size:11px;font-weight:700;margin-bottom:16px;border-radius:2px;flex-wrap:wrap;gap:8px;}
  .wf-nav-mock .logo{font-weight:900;letter-spacing:.5px;}
  .wf-nav-mock .links{display:flex;gap:13px;color:#555;font-weight:600;flex-wrap:wrap;}

  .wf-footer-mock{border:1.5px solid #999;padding:18px;background:#f7f7f7;font-size:11.5px;border-radius:3px;}
  .wf-footer-mock .cols{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:16px;}
  @media(max-width:900px){.wf-footer-mock .cols{grid-template-columns:repeat(2,1fr);}}
  .wf-footer-mock h5{font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin:0 0 8px;color:#333;}
  .wf-footer-mock ul{margin:0;padding-left:14px;color:#666;}
  .wf-footer-mock ul li{margin-bottom:4px;}

  .wf-quote{font-size:16px;font-style:italic;font-weight:600;color:#333;border-left:4px solid #222;padding-left:14px;margin:8px 0;}

  .tree{font-family:Consolas,monospace;font-size:12px;background:#fafafa;border:1px solid #bbb;padding:14px 16px;border-radius:2px;line-height:1.7;white-space:pre;overflow-x:auto;}

  .sitemap-list{counter-reset:pg;}
  .sitemap-item{border:1px solid #bbb;background:#fafafa;padding:10px 14px;margin-bottom:8px;border-radius:2px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;}
  .sitemap-item:hover{background:#eee;}
  .sitemap-item .n{font-weight:900;font-size:16px;color:#999;width:26px;}
  .sitemap-item .txt b{font-size:13px;}
  .sitemap-item .txt div{font-size:11.5px;color:#666;margin-top:2px;}

  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:11px;color:#555;margin-top:10px;}
  .legend span{display:flex;align-items:center;gap:6px;}
  .legend .sw{width:16px;height:16px;border-radius:2px;display:inline-block;}
</style>
</head>

/* ============================================================
   RENDERER
   ============================================================ */
function h(tag, cls, inner){ return `<div class="${cls}">${inner}</div>`; }

function renderFlowSteps(steps, vertical){
  let out = `<div class="wf-flow${vertical?' vertical':''}">`;
  steps.forEach((s,i)=>{
    out += `<div class="step">${s}</div>`;
    if(i<steps.length-1) out += `<div class="arrow">${vertical?'↓':'→'}</div>`;
  });
  out += `</div>`;
  return out;
}

function renderCard(c){
  let items = (c.items||[]).map(i=>`<li>${i}</li>`).join('');
  return `<div class="wf-card"><h4>${c.title}</h4>${c.d?`<p class="d">${c.d}</p>`:''}${items?`<ul>${items}</ul>`:''}${c.more?`<div class="more">+ ${c.more}</div>`:''}</div>`;
}

function renderSection(sec){
  let inner = '';
  const tagHtml = sec.tag ? `<div class="wf-tag">${sec.tag}</div>` : '';

  if(sec.kind==='nav'){
    inner = `<div class="wf-nav-mock"><div class="logo">KAIZEN INFINITIES</div><div class="links">${sec.links.map(l=>`<span>${l}</span>`).join('')}</div><div class="wf-btn" style="padding:6px 14px;">${sec.cta}</div></div>`;
    return `<div class="wf-section">${tagHtml}${inner}</div>`;
  }
  if(sec.kind==='footerRef'){
    return `<div class="wf-footer-mock"><b>GLOBAL FOOTER</b> — repeats on every page. See full footer wireframe on the <i>Contact Us</i> page (About · Quick Links · Services · Industries · Connect).</div>`;
  }
  if(sec.kind==='globalFooter'){
    inner = `<div class="wf-footer-mock"><div class="cols">
      <div><h5>About</h5>Engineering Digital Transformation Through Continuous Innovation.</div>
      <div><h5>Quick Links</h5><ul><li>Home</li><li>About</li><li>Solutions</li><li>Industries</li><li>KINETIC™</li><li>Technologies</li><li>CyberNex</li><li>Careers</li><li>Resources</li><li>Contact</li></ul></div>
      <div><h5>Services</h5><ul><li>ERP Solutions</li><li>Custom Software</li><li>Web Development</li><li>Mobile Apps</li><li>AI Solutions</li><li>Cloud Engineering</li><li>Infrastructure</li><li>Cybersecurity</li></ul></div>
      <div><h5>Industries</h5><ul><li>Education</li><li>Manufacturing</li><li>Healthcare</li><li>Government</li><li>Retail</li><li>Agriculture</li><li>Corporate</li><li>Startups</li></ul></div>
      <div><h5>Connect</h5><ul><li>Phone</li><li>Email</li><li>LinkedIn</li><li>YouTube</li><li>Instagram</li><li>Facebook</li></ul></div>
    </div></div>`;
    return `<div class="wf-section"><div class="wf-tag">WEBSITE FOOTER (GLOBAL — every page)</div>${inner}</div>`;
  }

  let cls = 'wf-section' + (sec.dark?' dark':'') + (sec.kind==='dark'?' dark':'');
  inner += tagHtml;
  if(sec.eyebrow) inner += `<div class="wf-eyebrow">${sec.eyebrow}</div>`;
  if(sec.heading) inner += `<div class="wf-heading">${sec.heading}</div>`;
  if(sec.sub) inner += `<div class="wf-subheading">${sec.sub}</div>`;
  if(sec.intro) inner += `<div class="wf-subheading">${sec.intro}</div>`;

  switch(sec.kind){
    case 'hero':
      if(sec.buttons) inner += `<div class="wf-btnrow">${sec.buttons.map((b,i)=>`<div class="wf-btn${i>0?' secondary':''}">${b}</div>`).join('')}</div>`;
      if(sec.img) inner += `<div class="wf-img" style="height:150px;margin-top:12px;">${sec.img}</div>`;
      break;
    case 'dark':
      inner += `<div class="wf-subheading">${sec.body}</div>`;
      if(sec.cta) inner += `<div class="wf-btnrow"><div class="wf-btn">${sec.cta}</div></div>`;
      if(sec.note) inner += `<div class="wf-note"><strong>Designer Note</strong>${sec.note}</div>`;
      break;
    case 'text':
      (sec.body||[]).forEach(p=> inner += `<div class="wf-subheading">${p}</div>`);
      if(sec.flow){
        inner += `<div class="wf-eyebrow" style="margin-top:10px;">${sec.flowLabel||''}</div>`;
        inner += renderFlowSteps(sec.flow,false);
      }
      break;
    case 'pills':
      inner += `<div class="wf-checklist" style="columns:1;"><div class="wf-flow">${sec.items.map(i=>`<div class="step" style="background:#eef7f0;border-color:#1f8a4c;color:#155c31;">✓ ${i}</div>`).join('')}</div></div>`;
      break;
    case 'cards':
      inner += `<div class="wf-grid cols-${sec.cols||3}">${sec.cards.map(renderCard).join('')}</div>`;
      break;
    case 'tagsCards':
      inner += `<div class="wf-flow">${sec.tags.map(t=>`<div class="step" style="background:#eef1f6;">${t}</div>`).join('')}</div>`;
      inner += `<div class="wf-eyebrow" style="margin-top:12px;">Capabilities</div><div class="wf-checklist">${sec.caps.map(c=>`<div class="wf-check">${c}</div>`).join('')}</div>`;
      break;
    case 'flow':
      inner += renderFlowSteps(sec.steps, sec.vertical);
      break;
    case 'icons':
      inner += `<div class="wf-icons">${sec.items.map(i=>`<div class="wf-icon-item"><div class="wf-icon-circ">ICON</div>${i}</div>`).join('')}</div>`;
      break;
    case 'list':
      inner += `<div class="wf-checklist" style="${sec.cols===2?'':'columns:2;'}">${sec.items.map(i=>`<div class="wf-check">${i}</div>`).join('')}</div>`;
      break;
    case 'checklist':
      inner += `<div class="wf-checklist">${sec.items.map(i=>`<div class="wf-check">${i}</div>`).join('')}</div>`;
      break;
    case 'table':
      inner += `<table class="wf-table"><thead><tr>${sec.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${sec.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      break;
    case 'accordion':
      inner += sec.items.map(it=>`<details class="wf-acc"><summary>${it.title}<span style="font-weight:400;color:#888;">click to expand</span></summary><div class="body">${it.body}</div></details>`).join('');
      break;
    case 'split':
      inner += `<div class="wf-split"><div class="wf-subheading">${sec.text}</div><div class="wf-img" style="height:130px;">${sec.img}</div></div>`;
      break;
    case 'form':
      inner += `<div class="wf-form">${sec.fields.map(f=>`<div class="wf-field">${f}</div>`).join('')}<div class="wf-field area full">${sec.textarea}</div></div><div class="wf-btnrow" style="margin-top:12px;"><div class="wf-btn">${sec.submit}</div></div>`;
      break;
    case 'metrics':
      inner += `<div class="wf-metrics">${sec.items.map(i=>`<div class="wf-metric"><div class="num">##</div><div class="lbl">${i}</div></div>`).join('')}</div>`;
      break;
    case 'ctaBlock':
      inner += `<div class="wf-btnrow">${sec.primary?`<div class="wf-btn">${sec.primary}</div>`:''}${sec.secondary?`<div class="wf-btn secondary">${sec.secondary}</div>`:''}</div>`;
      break;
    case 'tree':
      inner += `<div class="tree">${sec.text}</div>`;
      break;
    case 'sitemap':
      inner += `<div class="sitemap-list">${sec.items.map((it,idx)=>`<div class="sitemap-item" onclick="jumpFromOverview(${idx})"><div class="n">${idx+1}</div><div class="txt"><b>${it[0]}</b><div>${it[1]}</div></div></div>`).join('')}</div>`;
      break;
    case 'legend':
      inner = `<div class="wf-eyebrow">Wireframe Legend</div><div class="legend">
        <span><span class="sw" style="background:#ececec;border:1.5px solid #222;"></span> Button / CTA</span>
        <span><span class="sw" style="background:repeating-linear-gradient(45deg,#f2f2f2,#f2f2f2 4px,#e4e4e4 4px,#e4e4e4 8px);border:1.5px dashed #9aa0a6;"></span> Image / illustration placeholder</span>
        <span><span class="sw" style="background:#fff8e6;border:1.5px dashed #b8860b;"></span> Designer note (from source brief)</span>
        <span><span class="sw" style="background:#1c2430;"></span> Dark / featured full-width section</span>
        <span>▸ Click accordion headers to expand phase / step detail</span>
      </div>`;
      return `<div class="wf-section">${inner}</div>`;
  }

  if(sec.note && sec.kind!=='dark') inner += `<div class="wf-note"><strong>Designer Note</strong>${sec.note}</div>`;
  if(sec.kind==='note-standalone'){
    return `<div class="wf-section"><div class="wf-tag">${sec.tag}</div><div class="wf-note" style="margin-top:0;"><strong>${sec.heading}</strong>${sec.body}</div></div>`;
  }

  return `<div class="${cls}">${inner}</div>`;
}

function renderPage(p){
  let html = `<div class="wf-page-head"><div class="k">${p.kicker||('WIREFRAME · '+p.title.toUpperCase())}</div><h1>${p.title}</h1>${p.sub?`<div class="k2">${p.sub}</div>`:''}</div>`;
  p.sections.forEach(sec=>{ html += renderSection(sec); });
  return html;
}

/* build sidebar + main */
const sidebar = document.getElementById('sidebar');
const main = document.getElementById('main');

PAGES.forEach((p,idx)=>{
  const btn = document.createElement('button');
  btn.innerHTML = p.nav.replace(/^\d+\.\s*/, '');
  btn.dataset.idx = idx;
  btn.onclick = ()=> showPage(idx);
  sidebar.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'page';
  div.id = 'page-'+p.id;
  div.innerHTML = renderPage(p);
  main.appendChild(div);
});

function showPage(idx){
  document.querySelectorAll('.page').forEach((el,i)=> el.classList.toggle('active', i===idx));
  document.querySelectorAll('.sidebar button').forEach((el,i)=> el.classList.toggle('active', i===idx));
  window.scrollTo(0,0);
}
function jumpFromOverview(idx){ showPage(idx+1); }

showPage(0);
</script>
